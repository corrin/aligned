name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install -e ".[dev]"
      - name: mypy
        run: |
          source .venv/bin/activate
          mypy aligned --strict
      - name: ruff check
        run: |
          source .venv/bin/activate
          ruff check aligned
      - name: ruff format
        run: |
          source .venv/bin/activate
          ruff format --check aligned
      - name: pytest
        run: |
          source .venv/bin/activate
          pytest -v
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          JWT_SECRET_KEY: test-secret

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npx vue-tsc --build
      - name: Build
        run: npm run build
